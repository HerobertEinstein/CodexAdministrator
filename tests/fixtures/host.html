<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Host fixture</title>
    <style>
      :root { font-family: "Segoe UI Variable", "Segoe UI", sans-serif; color-scheme: light dark; }
      body { margin: 0; min-height: 100vh; background: Canvas; color: CanvasText; }
      .host { min-height: 100vh; display: grid; grid-template-columns: 240px 1fr; }
      aside { padding: 18px; border-right: 1px solid color-mix(in srgb, CanvasText 12%, transparent); }
      main { display: grid; place-items: center; }
      h1 { font-size: 18px; }
      @media (max-width: 640px) { .host { grid-template-columns: 1fr; } aside { display: none; } }
    </style>
  </head>
  <body>
    <div class="host">
      <aside>Official host navigation</aside>
      <main><h1>Native GPT workspace</h1></main>
    </div>
  </body>
</html>
